name: Daily Build & Release

# 每日定时构建 + 手动触发，自动发布 GitHub Release（含 dist.zip 产物）
on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write # 创建 Release + tag

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整 git 历史，用于生成 Release Notes

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖（可重现）
        run: pnpm install --frozen-lockfile

      - name: 生产构建（含类型检查）
        run: pnpm build

      - name: 打包产物
        run: cd dist && zip -r ../dist.zip .

      - name: 获取日期
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: 生成 Release Notes
        run: |
          {
            echo "## Daily Build ${{ steps.date.outputs.date }}"
            echo ""
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "### 最近提交"
            echo '```'
            git log --oneline -10
            echo '```'
          } > release-notes.md

      - name: 创建 Release
        run: |
          TAG="daily-${{ steps.date.outputs.date }}"
          # 同日重复触发时，先删除旧 Release + tag，再创建新的
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --title "Daily Build ${{ steps.date.outputs.date }}" \
            --notes-file release-notes.md \
            --prerelease \
            dist.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}